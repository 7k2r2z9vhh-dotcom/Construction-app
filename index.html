<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Construction Enterprise</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-12">

    <header class="bg-slate-800 text-white p-4 shadow-md sticky top-0 z-10">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-lg font-bold">🏗️ MAX ENTERPRISE</h1>
                <p class="text-xs text-slate-400">ผู้ใช้: สมชาย (โฟร์แมน)</p>
            </div>
            <select id="projectSelect" onchange="switchProject()" class="bg-slate-700 text-white text-sm p-2 rounded-lg border border-slate-600 outline-none">
                <option value="p1">🛣️ งานทาง หลวงแพ่ง</option>
                <option value="p2">🏠 หมู่บ้าน แกรนด์วิลล์</option>
                <option value="p3">🏢 อาคารพาณิชย์ บางนา</option>
            </select>
        </div>
    </header>

    <div class="max-w-md mx-auto p-4 space-y-6" id="appContent">
        
        <div class="bg-emerald-50 p-4 rounded-2xl border border-emerald-200 shadow-sm">
            <h3 class="text-sm font-bold text-emerald-800 mb-2 flex items-center gap-1">
                💬 LINE Sync (ข้อมูลล่าสุดจากกลุ่มไลน์)
            </h3>
            <div class="bg-white p-3 rounded-xl border border-emerald-100 text-xs text-gray-600 space-y-1">
                <p class="font-semibold text-emerald-700">ช่างแจ็ค (หน้างาน):</p>
                <p>"วันนี้ซื้อปูนเพิ่ม 10 ถุง 1,500 บาทครับ"</p>
                <button onclick="importFromLine()" class="mt-2 bg-emerald-600 text-white px-2 py-1 rounded-md text-2xl font-bold font-medium hover:bg-emerald-700 transition">
                    📥 ดึงเข้ารถบบัญชีโปรเจกต์นี้
                </button>
            </div>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-200">
            <h2 class="text-lg font-bold text-gray-800 mb-4">📝 บันทึก/แก้ไข ข้อมูลโครงการ</h2>
            <div class="space-y-3">
                <input type="text" id="itemName" placeholder="ชื่อรายการ / ค่าใช้จ่าย" class="w-full p-3 border border-gray-300 rounded-xl outline-none text-sm">
                <input type="number" id="itemAmount" placeholder="จำนวนเงิน (บาท)" class="w-full p-3 border border-gray-300 rounded-xl outline-none text-sm">
                <button onclick="saveData()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold p-3 rounded-xl shadow-sm transition text-sm">
                    💾 บันทึกข้อมูล (Sync ขึ้นระบบคลาวด์)
                </button>
            </div>
        </div>

        <div id="pdfReport" class="bg-white p-5 rounded-2xl shadow-sm border border-gray-200 bg-white">
            <div class="text-center border-b border-gray-200 pb-3 mb-4">
                <h2 class="text-md font-bold text-gray-800" id="reportTitle">รายงานต้นทุน: งานทาง หลวงแพ่ง</h2>
                <p class="text-xs text-gray-400">พิมพ์เมื่อ: <span id="reportDate"></span></p>
            </div>
            
            <div class="space-y-2" id="reportItems">
                <div class="flex justify-between text-sm p-2 bg-gray-50 rounded-lg">
                    <span>ค่าหินคลุก (รถพ่วง)</span>
                    <span class="font-bold">24,000 บาท</span>
                </div>
            </div>
            
            <div class="mt-4 pt-3 border-t-2 border-dashed border-gray-200 flex justify-between font-bold text-gray-900">
                <span>ยอดรวมทั้งหมด:</span>
                <span class="text-blue-600" id="projectTotal">24,000 บาท</span>
            </div>
        </div>

        <button onclick="exportToPDF()" class="w-full bg-rose-600 hover:bg-rose-700 text-white font-bold p-3.5 rounded-xl shadow-md flex items-center justify-center gap-2 transition text-sm">
            📄 ดาวน์โหลดรายงานเป็นไฟล์ PDF
        </button>

    </div>

    <script>
        // จำลองฐานข้อมูลภายในแอป สำหรับหลายโปรเจกต์
        const projectData = {
            p1: { title: "รายงานต้นทุน: งานทาง หลวงแพ่ง", items: [{n: "ค่าหินคลุก (รถพ่วง)", a: 24000}], total: 24000 },
            p2: { title: "รายงานต้นทุน: หมู่บ้าน แกรนด์วิลล์", items: [{n: "ค่าเสาเข็มไอ", a: 85000}, {n: "ค่าแรงขุดฐานราก", a: 12000}], total: 97000 },
            p3: { title: "รายงานต้นทุน: อาคารพาณิชย์ บางนา", items: [{n: "ค่าพิมพ์เขียวแบบแปลน", a: 3500}], total: 3500 }
        };

        // ฟังก์ชันสลับโปรเจกต์
        function switchProject() {
            const pId = document.getElementById('projectSelect').value;
            const data = projectData[pId];
            
            document.getElementById('reportTitle').innerText = data.title;
            
            const itemsContainer = document.getElementById('reportItems');
            itemsContainer.innerHTML = '';
            data.items.forEach(item => {
                itemsContainer.innerHTML += `<div class="flex justify-between text-sm p-2 bg-gray-50 rounded-lg"><span>${item.n}</span><span class="font-bold">${item.a.toLocaleString()} บาท</span></div>`;
            });
            
            document.getElementById('projectTotal').innerText = data.total.toLocaleString() + " บาท";
        }

        // ฟังก์ชันจำลองดึงจาก LINE
        function importFromLine() {
            const pId = document.getElementById('projectSelect').value;
            projectData[pId].items.push({n: "ปูนถุง (ดึงจาก LINE)", a: 1500});
            projectData[pId].total += 1500;
            switchProject();
            alert("ดึงข้อมูลจาก LINE เข้าสู่โปรเจกต์เรียบร้อยครับ!");
        }

        // ฟังก์ชันบันทึกและแก้ไขข้อมูล
        function saveData() {
            const name = document.getElementById('itemName').value;
            const amount = parseFloat(document.getElementById('itemAmount').value) || 0;
            const pId = document.getElementById('projectSelect').value;

            if(!name || amount <= 0) return alert("กรุณากรอกข้อมูลให้ครบถ้วน");

            projectData[pId].items.push({n: name, a: amount});
            projectData[pId].total += amount;
            
            switchProject();
            document.getElementById('itemName').value = '';
            document.getElementById('itemAmount').value = '';
        }

        // ฟังก์ชันส่งออกเป็น PDF (ทำงานได้บน Safari / Chrome ใน iPhone)
        function exportToPDF() {
            const element = document.getElementById('pdfReport');
            const opt = {
                margin:       10,
                filename:     'Construction-Report.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2 },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2canvas:  { scale: 2 },
            html2pdf().set(opt).from(element).save();
        }

        document.getElementById('reportDate').innerText = new Date().toLocaleDateString('th-TH');
    </script>
</body>
</html>
