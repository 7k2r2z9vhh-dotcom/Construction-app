<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Construction App</title>
    <!-- ใช้ Tailwind CSS ตกแต่งปุ่มและหน้าจอให้กดง่ายบนมือถือ -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-12">

    <!-- Header ด้านบนสุด -->
    <header class="bg-amber-500 text-white p-4 shadow-md sticky top-0 z-10 text-center">
        <h1 class="text-xl font-bold tracking-wide">⚙️ MAX CONSTRUCTION</h1>
        <p class="text-xs opacity-90">ระบบคำนวณงานทาง & บันทึกหน้างาน</p>
    </header>

    <div class="max-w-md mx-auto p-4 space-y-6">
        
        <!-- ส่วนที่ 1: คำนวณปริมาณวัสดุ -->
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-200">
            <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
                📐 คำนวณวัสดุโครงสร้างทาง
            </h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">ความกว้างหน้างาน (เมตร)</label>
                    <input type="number" id="width" value="5.4" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-amber-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">ความยาวหน้างาน (เมตร)</label>
                    <input type="number" id="length" value="100" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-amber-500 outline-none">
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">ทรายบดอัด (ซม.)</label>
                        <input type="number" id="sandThickness" value="10" class="w-full p-3 border border-gray-300 rounded-xl">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">หินคลุก (ซม.)</label>
                        <input type="number" id="stoneThickness" value="20" class="w-full p-3 border border-gray-300 rounded-xl">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">ผิวแอสฟัลต์ (ซม.)</label>
                        <input type="number" id="asphaltThickness" value="5" class="w-full p-3 border border-gray-300 rounded-xl">
                    </div>
                </div>

                <button onclick="calculateMaterials()" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-bold p-3.5 rounded-xl mt-2 shadow-sm transition">
                    🔄 คำนวณปริมาณวัสดุ
                </button>
            </div>

            <!-- แสดงผลลัพธ์การคำนวณหน่วยเป็น ตัน -->
            <div class="mt-5 pt-4 border-t border-gray-100 space-y-2.5">
                <div class="text-sm text-gray-500 font-medium">พื้นที่รวม: <span id="resArea" class="text-gray-800 font-bold">540</span> ตร.ม.</div>
                <div class="flex justify-between bg-amber-50 p-3 rounded-xl border border-amber-100">
                    <span class="text-gray-700 font-medium">⏳ ทรายบดอัดที่ต้องใช้:</span>
                    <span class="font-bold text-amber-700"><span id="resSand">75.60</span> ตัน</span>
                </div>
                <div class="flex justify-between bg-blue-50 p-3 rounded-xl border border-blue-100">
                    <span class="text-gray-700 font-medium">🪨 หินคลุกที่ต้องใช้:</span>
                    <span class="font-bold text-blue-700"><span id="resStone">237.60</span> ตัน</span>
                </div>
                <div class="flex justify-between bg-gray-50 p-3 rounded-xl border border-gray-200">
                    <span class="text-gray-700 font-medium">🖤 แอสฟัลต์คอนกรีต:</span>
                    <span class="font-bold text-gray-800"><span id="resAsphalt">64.80</span> ตัน</span>
                </div>
            </div>
        </div>

        <!-- ส่วนที่ 2: บันทึกต้นทุนรายวัน -->
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-200">
            <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
                📝 บันทึกต้นทุนหน้างานวันนี้
            </h2>
            
            <div class="space-y-3">
                <input type="text" id="expenseNote" placeholder="เช่น ค่าแรงช่าง, ค่าเช่ารถบด, ค่าหินเพิ่ม" class="w-full p-3 border border-gray-300 rounded-xl outline-none">
                <input type="number" id="expenseAmount" placeholder="จำนวนเงิน (บาท)" class="w-full p-3 border border-gray-300 rounded-xl outline-none">
                <button onclick="addExpense()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold p-3 rounded-xl shadow-sm transition">
                    ➕ บันทึกรายการ
                </button>
            </div>

            <!-- รายการที่ถูกบันทึกจะมาโผล่ตรงนี้ -->
            <div class="mt-5">
                <div class="flex justify-between font-bold text-sm text-gray-600 mb-2">
                    <span>รายการ</span>
                    <span>จำนวนเงิน</span>
                </div>
                <div id="expenseList" class="space-y-2 max-h-48 overflow-y-auto"></div>
                <div class="mt-4 pt-3 border-t border-gray-200 flex justify-between font-bold text-gray-800">
                    <span>💰 รวมต้นทุนสะสมวันนี้:</span>
                    <span class="text-emerald-600"><span id="totalExpense">0</span> บาท</span>
                </div>
            </div>
        </div>

    </div>

    <!-- สคริปต์ระบบคำนวณเบื้องหลัง -->
    <script>
        function calculateMaterials() {
            const width = parseFloat(document.getElementById('width').value) || 0;
            const length = parseFloat(document.getElementById('length').value) || 0;
            
            const sandCm = parseFloat(document.getElementById('sandThickness').value) || 0;
            const stoneCm = parseFloat(document.getElementById('stoneThickness').value) || 0;
            const asphaltCm = parseFloat(document.getElementById('asphaltThickness').value) || 0;

            const area = width * length;
            document.getElementById('resArea').innerText = area.toLocaleString();

            // สูตรแปลง คิว เป็น ตัน (อ้างอิงความหนาแน่นเฉลี่ยงานทาง)
            const sandTon = (area * (sandCm / 100)) * 1.4;
            const stoneTon = (area * (stoneCm / 100)) * 2.2;
            const asphaltTon = (area * (asphaltCm / 100)) * 2.4;

            document.getElementById('resSand').innerText = sandTon.toFixed(2);
            document.getElementById('resStone').innerText = stoneTon.toFixed(2);
            document.getElementById('resAsphalt').innerText = asphaltTon.toFixed(2);
        }

        let total = 0;

        function addExpense() {
            const noteInput = document.getElementById('expenseNote');
            const amountInput = document.getElementById('expenseAmount');
            
            const note = noteInput.value.trim();
            const amount = parseFloat(amountInput.value) || 0;

            if (note === "" || amount <= 0) {
                alert("กรุณากรอกข้อมูลรายการและจำนวนเงินให้ถูกต้องครับ");
                return;
            }

            total += amount;
            document.getElementById('totalExpense').innerText = total.toLocaleString();

            const list = document.getElementById('expenseList');
            const item = document.createElement('div');
            item.className = "flex justify-between bg-gray-50 p-2.5 rounded-lg text-sm text-gray-700 border border-gray-100";
            item.innerHTML = `<span>${note}</span> <span class="font-semibold text-gray-900">${amount.toLocaleString()} บาท</span>`;
            
            list.appendChild(item);

            noteInput.value = "";
            amountInput.value = "";
        }

        // ให้รันคำนวณค่าเริ่มต้นทันทีเมื่อเปิดแอป
        window.onload = calculateMaterials;
    </script>
</body>
</html>
